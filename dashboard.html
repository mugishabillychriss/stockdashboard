<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Subscription Approvals</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-check-circle"></i>
                <span>SubsApprove</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="clients.html" class="nav-item">
                    <i class="fas fa-building"></i>
                    <span>Clients</span>
                </a>
                <a href="#" class="nav-item" id="pendingLink">
                    <i class="fas fa-clock"></i>
                    <span>Pending</span>
                    <span class="badge" id="pendingBadge">0</span>
                </a>
                <a href="#" class="nav-item" id="approvedLink">
                    <i class="fas fa-check-circle"></i>
                    <span>Approved</span>
                </a>
                <a href="#" class="nav-item" id="rejectedLink">
                    <i class="fas fa-times-circle"></i>
                    <span>Rejected</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <div>
                        <div class="user-name">Admin User</div>
                        <div class="user-role">Administrator</div>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <h1>Subscription Requests</h1>
                <div class="header-actions">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search by company or code..." id="searchInput">
                    </div>
                    <button class="btn-refresh" onclick="loadRequests()">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <!-- Simulate incoming request (for demo) -->
                    <button class="btn-primary" onclick="showSimulateModal()">
                        <i class="fas fa-plus"></i> Simulate Request
                    </button>
                </div>
            </header>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card blue">
                    <div class="stat-icon">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div>
                        <div class="stat-label">Pending</div>
                        <div class="stat-value" id="statPending">0</div>
                    </div>
                </div>
                <div class="stat-card green">
                    <div class="stat-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div>
                        <div class="stat-label">Approved</div>
                        <div class="stat-value" id="statApproved">0</div>
                    </div>
                </div>
                <div class="stat-card red">
                    <div class="stat-icon">
                        <i class="fas fa-times-circle"></i>
                    </div>
                    <div>
                        <div class="stat-label">Rejected</div>
                        <div class="stat-value" id="statRejected">0</div>
                    </div>
                </div>
                <div class="stat-card purple">
                    <div class="stat-icon">
                        <i class="fas fa-dollar-sign"></i>
                    </div>
                    <div>
                        <div class="stat-label">Revenue (MTD)</div>
                        <div class="stat-value" id="statRevenue">$0</div>
                    </div>
                </div>
            </div>

            <!-- Filter Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-filter="pending">Pending</button>
                <button class="tab-btn" data-filter="approved">Approved</button>
                <button class="tab-btn" data-filter="rejected">Rejected</button>
                <button class="tab-btn" data-filter="all">All</button>
            </div>

            <!-- Requests Grid -->
            <div class="requests-grid" id="requestsGrid">
                <!-- Dynamic content -->
            </div>

            <!-- No requests message -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <i class="fas fa-inbox"></i>
                <h3>No requests found</h3>
                <p>New subscription requests will appear here.</p>
            </div>
        </main>
    </div>

    <!-- Simulate Request Modal -->
    <div class="modal" id="simulateModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Simulate New Payment Confirmation</h2>
                <button class="modal-close" onclick="closeModal('simulateModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="simulateForm">
                    <div class="form-group">
                        <label>Company Code</label>
                        <input type="text" id="simCode" placeholder="e.g., TEC001" required>
                    </div>
                    <div class="form-group">
                        <label>Company Name</label>
                        <input type="text" id="simName" placeholder="e.g., TechStart Solutions" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="simEmail" placeholder="contact@company.com" required>
                    </div>
                    <div class="form-group">
                        <label>Subscription Plan</label>
                        <select id="simPlan">
                            <option value="Basic - $29/month">Basic - $29/month</option>
                            <option value="Professional - $49/month">Professional - $49/month</option>
                            <option value="Enterprise - $99/month">Enterprise - $99/month</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Payment Transaction ID</label>
                        <input type="text" id="simTxn" placeholder="e.g., TXN123456" required>
                    </div>
                    <div class="form-group">
                        <label>Amount ($)</label>
                        <input type="number" id="simAmount" placeholder="49.00" step="0.01" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal('simulateModal')">Cancel</button>
                <button class="btn-primary" onclick="simulateRequest()">Send Request</button>
            </div>
        </div>
    </div>

    <!-- Request Details Modal -->
    <div class="modal" id="detailsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Request Details</h2>
                <button class="modal-close" onclick="closeModal('detailsModal')">&times;</button>
            </div>
            <div class="modal-body" id="detailsBody">
                <!-- Filled dynamically -->
            </div>
            <div class="modal-footer" id="detailsFooter">
                <!-- Buttons will be added here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="requests.js"></script>
</body>
</html>
